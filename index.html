<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Helix Linear — Part Lookup Tool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  .lookup-wrap {
    max-width: 820px;
    margin: 0 auto;
  }

  .lookup-header {
    margin-bottom: 2rem;
  }

  .lookup-header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #1a1a1a;
    margin-bottom: 0.35rem;
  }

  .lookup-header p {
    font-size: 0.9rem;
    color: #666;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }

  #q {
    flex: 1;
    font-size: 0.95rem;
    padding: 10px 14px;
    border: 1.5px solid #d0d0cc;
    border-radius: 6px;
    background: #fff;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }

  #q:focus { border-color: #c8102e; }

  #btn {
    padding: 10px 22px;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    border: none;
    border-radius: 6px;
    background: #c8102e;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }

  #btn:hover { background: #a50d25; }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .fil {
    font-size: 0.78rem;
    font-weight: 500;
    padding: 5px 12px;
    border: 1.5px solid #d0d0cc;
    border-radius: 20px;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: all 0.12s;
  }

  .fil:hover { border-color: #aaa; color: #1a1a1a; }

  .fil.active {
    border-color: #c8102e;
    background: #c8102e;
    color: #fff;
  }

  .results { display: flex; flex-direction: column; gap: 10px; }

  .rcard {
    background: #fff;
    border: 1px solid #e4e4e0;
    border-radius: 8px;
    padding: 1.1rem 1.25rem;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .rcard:hover {
    border-color: #c8102e;
    box-shadow: 0 2px 12px rgba(200,16,46,0.07);
  }

  .rcard-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .rcard-title {
    font-size: 0.97rem;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 3px;
  }

  .src-pills { display: flex; gap: 5px; flex-wrap: wrap; }

  .src-pill {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border-radius: 3px;
    background: #f0f0ec;
    color: #555;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 3px 9px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .b-blue   { background: #dbeafe; color: #1e40af; }
  .b-purple { background: #ede9fe; color: #5b21b6; }
  .b-teal   { background: #d1fae5; color: #065f46; }
  .b-amber  { background: #fef3c7; color: #92400e; }
  .b-coral  { background: #fee2e2; color: #991b1b; }
  .b-green  { background: #dcfce7; color: #166534; }
  .b-gray   { background: #f3f4f6; color: #374151; }
  .b-pink   { background: #fce7f3; color: #9d174d; }

  .divider {
    border-top: 1px solid #f0f0ec;
    margin: 10px 0;
  }

  .helix-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 4px;
  }

  .helix-pn {
    font-size: 0.95rem;
    font-weight: 600;
    color: #1a1a1a;
    font-family: 'Courier New', monospace;
  }

  .helix-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.9rem;
    font-weight: 600;
    color: #c8102e;
    text-decoration: none;
  }

  .helix-link:hover { text-decoration: underline; }

  .helix-link svg {
    width: 13px;
    height: 13px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .note {
    font-size: 0.78rem;
    color: #888;
    margin-top: 7px;
    line-height: 1.5;
  }

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: #999;
    font-size: 0.9rem;
  }

  .empty a { color: #c8102e; font-weight: 600; }

  @media (max-width: 540px) {
    .rcard-top { flex-direction: column; }
    .badge { align-self: flex-start; }
    #btn { padding: 10px 14px; }
  }

const BADGE_COLOR = {
  "Ball screw — metric":"b-blue",
  "Ball screw — inch":"b-purple",
  "Linear guide rail":"b-teal",
  "Linear stage":"b-pink",
  "Bearing mount":"b-amber",
  "Lead screw":"b-coral",
  "Nut":"b-green",
  "Actuator":"b-coral",
  "Roller screw":"b-gray",
};

let activeFilter = "all";

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll(".fil").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  search();
}

function score(row, q) {
  if (!q) return 1;
  const ql = q.toLowerCase().replace(/[^a-z0-9x]/g,"");
  let best = 0;
  for (const inp of row.inputs) {
    const il = inp.toLowerCase().replace(/[^a-z0-9x]/g,"");
    if (il === ql) return 100;
    if (il.startsWith(ql) || ql.startsWith(il)) { best = Math.max(best,80); continue; }
    if (il.includes(ql) || ql.includes(il)) { best = Math.max(best,60); continue; }
    const words = ql.split(/\s+/);
    if (words.length > 1 && words.every(w => il.includes(w))) { best = Math.max(best,40); }
  }
  if (row.label.toLowerCase().includes(q.toLowerCase())) best = Math.max(best,35);
  if (row.cat.toLowerCase().includes(q.toLowerCase())) best = Math.max(best,30);
  return best;
}

function renderResult(r) {
  if (r.helix_type === "pn") {
    return `<div class="helix-pn">${r.helix_pn}</div>`;
  }
  if (r.helix_type === "url") {
    return `<a class="helix-link" href="${r.helix_url}" target="_blank" rel="noopener">${r.helix_pn} ${EXTERNAL_ICON}</a>`;
  }
  return `<a class="helix-link" href="${CONTACT}" target="_blank" rel="noopener">Contact Helix engineering ${EXTERNAL_ICON}</a>`;
}

function search() {
  const q = document.getElementById("q").value.trim();
  const container = document.getElementById("results");
  container.innerHTML = "";

  let rows = DATA;
  if (activeFilter !== "all") rows = rows.filter(r => r.tags.includes(activeFilter));

  let scored = rows.map(r => ({r, s: score(r, q)})).filter(x => x.s > 0 || !q);
  scored.sort((a,b) => b.s - a.s);
  const hits = q ? scored.filter(x => x.s >= 30) : scored;

  if (hits.length === 0) {
    container.innerHTML = `<div class="empty">No results found for "<strong>${q}</strong>"<br><br><a href="${CONTACT}" target="_blank" rel="noopener">Contact Helix engineering →</a></div>`;
    return;
  }

  for (const {r} of hits) {
    const div = document.createElement("div");
    div.className = "rcard";
    const srcs = r.src.map(s => `<span class="src-pill">${s}</span>`).join("");
    const bc = BADGE_COLOR[r.cat] || "b-gray";
    div.innerHTML = `
      <div class="rcard-top">
        <div>
          <div class="rcard-title">${r.label}</div>
          <div class="src-pills">${srcs}</div>
        </div>
        <span class="badge ${bc}">${r.cat}</span>
      </div>
      <div class="divider"></div>
      <div class="helix-label">Helix equivalent</div>
      ${renderResult(r)}
      ${r.note ? `<div class="note">${r.note}</div>` : ""}
    `;
    container.appendChild(div);
  }
}

document.getElementById("q").addEventListener("keydown", e => { if(e.key==="Enter") search(); });
search();

// Auto-resize: tell parent iframe how tall this page is
function sendHeight() {
  const h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: 'helix-lookup-height', height: h }, '*');
}
const ro = new ResizeObserver(sendHeight);
ro.observe(document.body);
sendHeight();
</script>
</body>
